<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatApp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap");

        :root {
            --bg-top: #0f172a;
            --bg-mid: #111f36;
            --bg-bottom: #1a2740;
            --glass-border: rgba(148, 163, 184, 0.26);
            --glass-fill: rgba(17, 30, 50, 0.62);
            --text-main: #f1f5f9;
            --text-muted: #90a1b9;
            --time-muted: #62748e;
            --incoming-fill: rgba(29, 41, 61, 0.5);
            --outgoing-fill: rgba(49, 65, 88, 0.44);
            --incoming-border: rgba(49, 65, 88, 0.58);
            --outgoing-border: rgba(69, 85, 108, 0.58);
            --composer-fill: rgba(49, 65, 88, 0.3);
            --radius-lg: 18px;
            --radius-sm: 10px;
            --bubble-shadow: 0 12px 24px rgba(0, 0, 0, 0.22), 0 4px 10px rgba(0, 0, 0, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            align-items: center;
            background:
                radial-gradient(circle at 12% 18%, rgba(56, 189, 248, 0.18), transparent 42%),
                radial-gradient(circle at 88% 82%, rgba(14, 165, 233, 0.17), transparent 38%),
                linear-gradient(165deg, var(--bg-top) 0%, var(--bg-mid) 48%, var(--bg-bottom) 100%);
            color: var(--text-main);
            display: flex;
            font-family: "Manrope", "Segoe UI", sans-serif;
            justify-content: center;
            padding: 18px;
        }

        .chat-screen {
            animation: reveal 620ms cubic-bezier(0.2, 0.7, 0.2, 1) both;
            backdrop-filter: blur(14px);
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.66), rgba(15, 23, 42, 0.5));
            border: 1px solid var(--glass-border);
            border-radius: 26px;
            box-shadow: 0 32px 60px rgba(2, 6, 23, 0.52);
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: min(92vh, 760px);
            max-width: 390px;
            overflow: hidden;
            width: 100%;
        }

        .chat-header {
            background: var(--glass-fill);
            border-bottom: 1px solid rgba(49, 65, 88, 0.58);
            padding: 24px;
        }

        .chat-header h1 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 0.01em;
            line-height: 1;
        }

        .status {
            color: var(--text-muted);
            font-size: 15px;
            margin-top: 10px;
        }

        .feedback {
            color: var(--text-muted);
            font-size: 15px;
            margin-top: 10px;
            padding: auto;
            text-align: center;}


        .messages {
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            padding: 22px 20px;
            scrollbar-width: thin;
            scrollbar-color: rgba(148, 163, 184, 0.35) transparent;
        }

        .message {
            animation: slideIn 420ms ease both;
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 76%;
        }

        .message:nth-child(2) {
            animation-delay: 80ms;
        }

        .message:nth-child(3) {
            animation-delay: 160ms;
        }

        .message:nth-child(4) {
            animation-delay: 240ms;
        }

        .message.outgoing {
            align-self: flex-end;
            text-align: left;
        }

        .bubble {
            border-radius: var(--radius-lg);
            border: 1px solid;
            box-shadow: var(--bubble-shadow);
            font-size: 15px;
            line-height: 1.5;
            padding: 12px 16px;
        }

        .incoming .bubble {
            background: var(--incoming-fill);
            border-color: var(--incoming-border);
            border-bottom-left-radius: var(--radius-sm);
        }

        .outgoing .bubble {
            background: var(--outgoing-fill);
            border-color: var(--outgoing-border);
            border-bottom-right-radius: var(--radius-sm);
        }

        .time {
            color: var(--time-muted);
            font-size: 12px;
            padding: 0 8px;
        }

        .composer {
            background: var(--glass-fill);
            border-top: 1px solid rgba(49, 65, 88, 0.58);
            display: flex;
            gap: 12px;
            padding: 16px;
        }

        .composer-input {
            align-items: center;
            background: var(--composer-fill);
            border: 1px solid var(--outgoing-border);
            border-radius: 16px;
            color: var(--text-muted);
            display: flex;
            flex: 1;
            font-size: 16px;
            min-height: 49px;
            padding: 0 18px;
        }

        .send-btn {
            align-items: center;
            background: var(--outgoing-fill);
            border: 1px solid var(--outgoing-border);
            border-radius: 16px;
            cursor: pointer;
            display: inline-flex;
            height: 49px;
            justify-content: center;
            width: 49px;
        }

        .send-btn i {
            color: var(--text-main);
            font-size: 17px;
        }

        .send-btn:focus-visible {
            outline: 2px solid #38bdf8;
            outline-offset: 2px;
        }

        @keyframes reveal {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 0;
            }

            .chat-screen {
                border-radius: 0;
                height: 100vh;
                max-width: none;
            }

            .chat-header {
                padding-top: max(24px, env(safe-area-inset-top));
            }
        }
    </style>
</head>

<body>
    <main class="chat-screen" data-node-id="2:3">
        <header class="chat-header" data-node-id="2:4">
            <h1 data-node-id="2:6">Chat</h1>
            <p class="status" data-node-id="2:8">2 online</p>
        </header>

        <section class="messages" aria-label="Conversation">
            <article class="message incoming" data-node-id="2:10">
                <p class="bubble" data-node-id="2:14">Hey! How are you doing?</p>
                <span class="time" data-node-id="2:16">10:30 AM</span>
            </article>

            <article class="message outgoing" data-node-id="2:17">
                <p class="bubble" data-node-id="2:21">I'm doing great, thanks! Just working on some designs.</p>
                <span class="time" data-node-id="2:23">10:32 AM</span>
            </article>

            <article class="message incoming" data-node-id="2:24">
                <p class="bubble" data-node-id="2:28">That's awesome! What kind of designs?</p>
                <span class="time" data-node-id="2:30">10:33 AM</span>
            </article>

            <article class="message outgoing" data-node-id="2:31">
                <p class="bubble" data-node-id="2:35">A chat interface with glassmorphism effects. It's looking pretty cool!</p>
                <span class="time" data-node-id="2:37">10:35 AM</span>
            </article>

            <article class="message-feedback">
                <p class="feedback" data-node-id="2:35">Abishek is typing...</p>
            </article>

        </section>

        <form class="composer" data-node-id="2:38">
            <input type="text" class="composer-input" data-node-id="2:42" aria-label="Type a message" placeholder="Type a message..."/>
            <button class="send-btn" type="submit" aria-label="Send message" data-node-id="2:43">
                <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
            </button>
        </form>
    </main>
</body>
</html>
